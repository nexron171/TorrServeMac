name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    # The app targets macOS 26.2, so the runner must provide Xcode 26.2.
    # Bump this image / Xcode version if GitHub changes what's available.
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project TorrServeMac.xcodeproj \
            -scheme TorrServeMac \
            -destination 'platform=macOS' \
            -only-testing:TorrServeMacTests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
